<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Django Todo App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center">Django ToDo App</h2>

<h4 class="mt-4">My Tasks</h4>

{% for task in tasks %}

<div class="card m-2">
<div class="card-body">

{{ task.task }}

<span style="float:right">

<a href="{% url 'completeTask' task.id %}" class="btn btn-success btn-sm">
Complete
</a>

<a href="{% url 'deleteTask' task.id %}" class="btn btn-danger btn-sm">
Delete
</a>

</span>

</div>
</div>

{% empty %}

<p>No tasks yet.</p>

{% endfor %}

<hr>

<h4>Completed Tasks</h4>

{% for task in completed_tasks %}

<div class="card m-2">
<div class="card-body">

<s>{{ task.task }}</s>

</div>
</div>

{% empty %}

<p>No completed tasks.</p>

{% endfor %}

<hr>

<form action="{% url 'addTask' %}" method="POST">
{% csrf_token %}

<div class="input-group">

<input type="text" name="task" class="form-control" placeholder="Add new task" required>

<button class="btn btn-primary">Add Task</button>

</div>

</form>

</div>

</body>
</html>
